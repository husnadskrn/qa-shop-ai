<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QA Shop - Login</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header>
      <h1 data-cy="login-page-title">QA Shop Login</h1>
    </header>

    <div class="container">
      <div class="card" style="max-width: 420px; margin: 40px auto;">
        <label>E-posta</label>
        <input data-cy="email" id="email" type="email" placeholder="qa@example.com" />

        <label>Şifre</label>
        <input data-cy="password" id="password" type="password" placeholder="Test1234!" />

        <button data-cy="login-btn" id="loginBtn">Giriş Yap</button>

        <div data-cy="login-message" id="loginMessage"></div>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
